name: Terraform Plan

on:
  workflow_dispatch:
    inputs:
      target_dir:
        description: "Terraform root to plan"
        required: true
        default: "bootstrap"
        type: choice
        options:
          - bootstrap
          - environments/prod
          - environments/nonprod

# Cancel in-progress runs for the same target to avoid stale output
concurrency:
  group: terraform-plan-${{ inputs.target_dir }}
  cancel-in-progress: true

permissions:
  id-token: write  # Required for OIDC authentication to Azure
  contents: read

jobs:
  terraform-plan:
    name: Terraform Plan — ${{ inputs.target_dir }}
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ${{ inputs.target_dir }}

    env:
      ARM_CLIENT_ID:       ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID:       ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_USE_OIDC:        "true"
      BACKEND_SA:          ${{ secrets.BACKEND_STORAGE_ACCOUNT }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.7"

      - name: Terraform Format Check
        id: fmt
        run: terraform fmt -check -recursive .
        continue-on-error: true  # Non-blocking — surfaced in summary

      - name: Terraform Init
        id: init
        run: |
          terraform init \
            -backend-config="storage_account_name=${BACKEND_SA}" \
            -input=false

      - name: Terraform Validate
        id: validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        run: |
          terraform plan \
            -out=tfplan \
            -input=false \
            -no-color \
            2>&1 | tee plan_output.txt
        continue-on-error: true  # Capture output even on failure

      - name: Print Plan Summary
        run: |
          echo "### Terraform Plan — ${{ inputs.target_dir }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Step | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Format  | ${{ steps.fmt.outcome == 'success' && '✅' || '⚠️' }} \`${{ steps.fmt.outcome }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Init    | ${{ steps.init.outcome == 'success' && '✅' || '❌' }} \`${{ steps.init.outcome }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Validate| ${{ steps.validate.outcome == 'success' && '✅' || '❌' }} \`${{ steps.validate.outcome }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Plan    | ${{ steps.plan.outcome == 'success' && '✅' || '❌' }} \`${{ steps.plan.outcome }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "<details><summary>Plan Output</summary>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          head -c 60000 plan_output.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "</details>" >> $GITHUB_STEP_SUMMARY

      - name: Upload Plan File
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ inputs.target_dir == 'bootstrap' && 'bootstrap' || inputs.target_dir }}-${{ github.run_id }}
          path: |
            ${{ inputs.target_dir }}/tfplan
            ${{ inputs.target_dir }}/plan_output.txt
          retention-days: 7

      - name: Fail if plan failed
        if: steps.plan.outcome == 'failure'
        run: exit 1
